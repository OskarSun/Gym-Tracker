

services:
  db:
    image: postgres:15
    container_name: gymtracker-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gymtracker
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gymtracker-backend
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=gymtracker;Username=postgres;Password=postgres"
    ports:
      - "5119:5119"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gymtracker-frontend
    restart: always
    environment:
      VITE_API_URL: "http://localhost:5119/api"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data: